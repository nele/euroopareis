<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Euroopa Reis - JSON Reisileht</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica', 'Arial', sans-serif; }
    .hover-lift { transition: all 0.3s ease; }
    .hover-lift:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: translateY(-8px); }
    .loading { animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // MUUDA SELLE URL'I OMA GITHUB RAW JSON URL'ILE
    const JSON_URL = 'https://github.com/nele/euroopareis/blob/801b54304f2626a1e1d1e59b03914e24112c5132/cities-data.json';

    class TravelApp {
      constructor() {
        this.state = {
          city: '',
          selectedCity: null,
          activeTab: 'mustdo',
          loading: false,
          cities: [],
          data: {}
        };
        this.init();
      }

      async init() {
        this.render();
        await this.loadData();
      }

      async loadData() {
        try {
          this.state.loading = true;
          this.render();
          
          const response = await fetch(JSON_URL);
          if (!response.ok) throw new Error('Andmeid ei saadud laadida');
          
          const jsonData = await response.json();
          this.state.cities = jsonData.cities;
          
          // Salvesta andmed olekusse kiiremaks ligipääsuks
          jsonData.cities.forEach(city => {
            this.state.data[city.id] = {
              mustdo: city.mustdo,
              restaurants: city.restaurants,
              hidden: city.hidden,
              experiences: city.experiences,
              foods: city.foods
            };
          });

          this.state.loading = false;
          this.render();
          this.attachEventListeners();
        } catch (error) {
          console.error('Viga andmete laadimisega:', error);
          this.state.loading = false;
          this.state.error = 'Andmeid ei saadud laadida. Kontrolli JSON_URL!';
          this.render();
        }
      }

      attachEventListeners() {
        const searchForm = document.querySelector('form');
        const searchInput = document.querySelector('input[type="text"]');
        const tabButtons = document.querySelectorAll('[data-tab]');

        if (searchForm) {
          searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const selectedCity = this.state.cities.find(c => c.name === searchInput.value);
            if (selectedCity) {
              this.state.selectedCity = selectedCity;
              this.state.activeTab = 'mustdo';
              this.render();
              this.attachEventListeners();
            }
          });
        }

        tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            this.state.activeTab = btn.dataset.tab;
            this.render();
            this.attachEventListeners();
          });
        });
      }

      renderItems(items) {
        if (!items) return '<div class="col-span-full text-center text-gray-500">Andmeid laadatakse...</div>';
        
        return items.map((item, idx) => `
          <div class="bg-white rounded-xl shadow-lg overflow-hidden hover-lift">
            <div class="text-5xl bg-gradient-to-br from-orange-100 to-pink-100 h-32 flex items-center justify-center">${item.image || '📍'}</div>
            <div class="p-4">
              <h3 class="font-bold text-lg text-gray-800 mb-1">${item.name || ''}</h3>
              <p class="text-gray-600 text-xs leading-relaxed">${item.desc || ''}</p>
            </div>
          </div>
        `).join('');
      }

      render() {
        const appDiv = document.getElementById('app');
        const cityOptions = this.state.cities.map(city => `<option value="${city.name}">`).join('');
        let content = '';

        if (this.state.error) {
          content = `
            <div class="max-w-4xl mx-auto px-4 py-12 text-center">
              <div class="bg-red-100 border-l-4 border-red-500 p-6 rounded">
                <p class="text-red-700">❌ ${this.state.error}</p>
                <p class="text-red-600 text-sm mt-2">Palun kontrolli JSON_URL muutuja HTML faili alguses</p>
              </div>
            </div>
          `;
        } else if (this.state.loading) {
          content = `
            <div class="max-w-7xl mx-auto px-4 py-12 text-center">
              <div class="inline-block">
                <div class="text-4xl loading">⏳</div>
                <p class="text-gray-600 mt-4">Andmete laadimisele ootel...</p>
              </div>
            </div>
          `;
        } else if (this.state.selectedCity) {
          const city = this.state.selectedCity;
          const cityData = this.state.data[city.id];
          const activeData = cityData ? cityData[this.state.activeTab] || [] : [];

          content = `
            <div class="max-w-7xl mx-auto px-4 pb-12">
              <h2 class="text-3xl font-bold text-gray-800 mb-1">📍 ${city.name}</h2>
              <p class="text-lg text-gray-600 mb-6">${city.country || ''}</p>
              <div class="flex flex-wrap gap-2 mb-6">
                <button data-tab="mustdo" class="px-4 py-2 rounded-lg text-sm font-semibold ${this.state.activeTab === 'mustdo' ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-700'}">30 Must-Do</button>
                <button data-tab="restaurants" class="px-4 py-2 rounded-lg text-sm font-semibold ${this.state.activeTab === 'restaurants' ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-700'}">25 Söögikohad</button>
                <button data-tab="hidden" class="px-4 py-2 rounded-lg text-sm font-semibold ${this.state.activeTab === 'hidden' ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-700'}">30 Gems</button>
                <button data-tab="experiences" class="px-4 py-2 rounded-lg text-sm font-semibold ${this.state.activeTab === 'experiences' ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-700'}">25 Elamus</button>
                <button data-tab="foods" class="px-4 py-2 rounded-lg text-sm font-semibold ${this.state.activeTab === 'foods' ? 'bg-orange-500 text-white' : 'bg-gray-200 text-gray-700'}">25 Toit</button>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">${this.renderItems(activeData)}</div>
            </div>
          `;
        } else {
          content = `
            <div class="max-w-4xl mx-auto px-4 py-8 text-center">
              <p class="text-lg text-gray-600 mb-4">Vali linn allolevast loendist</p>
              <p class="text-sm text-gray-500">Saadaolevad linnad: ${this.state.cities.map(c => c.name).join(', ') || 'Laadimisele...'}</p>
            </div>
          `;
        }

        appDiv.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-orange-50 to-pink-50">
            <div class="bg-gradient-to-r from-orange-500 to-pink-500 text-white py-8 shadow-lg">
              <div class="max-w-7xl mx-auto px-4">
                <h1 class="text-3xl font-bold mb-2">✈️ Euroopa Reis</h1>
                <p class="text-sm opacity-90">JSON andmebaasist laaditud reisijuht</p>
              </div>
            </div>
            <div class="max-w-7xl mx-auto px-4 py-6">
              <form class="flex gap-2">
                <input 
                  type="text" 
                  placeholder="Otsida..." 
                  value="${this.state.city}"
                  class="flex-1 px-3 py-2 rounded-lg border-2 border-orange-300 focus:border-orange-500 focus:outline-none text-sm" 
                  list="cities"
                  ${this.state.cities.length === 0 ? 'disabled' : ''}
                />
                <datalist id="cities">${cityOptions}</datalist>
                <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-bold ${this.state.cities.length === 0 ? 'opacity-50 cursor-not-allowed' : ''}" ${this.state.cities.length === 0 ? 'disabled' : ''}>Otsi</button>
              </form>
            </div>
            ${content}
          </div>
        `;
      }
    }

    new TravelApp();
  </script>
</body>
</html>
